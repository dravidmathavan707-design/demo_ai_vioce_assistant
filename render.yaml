services:
  - type: web
    name: ai-voice-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    # --timeout 120: Gemini + REST fallback can exceed gunicorn's default 30s
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: MONGO_URI
        sync: false
